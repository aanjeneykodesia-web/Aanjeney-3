name: Android Release APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: FINAL_ANDROID_APP_FULL

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download Gradle 8.2
        run: |
          wget https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip gradle-8.2-bin.zip

      - name: Build APK
        run: ./gradle-8.2/bin/gradle assembleRelease

      - name: List outputs
        run: ls -R app/build/outputs

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: FINAL_ANDROID_APP_FULL/app/build/outputs/apk/release/*.apk
