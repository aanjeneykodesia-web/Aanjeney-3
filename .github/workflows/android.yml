name: Android Release APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: FINAL_ANDROID_APP_FULL   # 👈 IMPORTANT FIX

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant Gradle permission
        run: chmod +x gradlew

      - name: Build Release
        run: ./gradlew clean assembleRelease

      - name: List outputs (debug)
        run: ls -R app/build/outputs

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: FINAL_ANDROID_APP_FULL/app/build/outputs/apk/release/*.apk
